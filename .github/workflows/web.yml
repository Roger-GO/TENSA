name: web (v0.1+ UI)

on:
  push:
    branches: [main, "feat/**"]
    paths:
      - "web/**"
      - ".github/workflows/web.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web.yml"

jobs:
  check:
    name: typecheck + lint + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm typecheck
        run: pnpm typecheck

      - name: pnpm lint
        run: pnpm lint

      - name: pnpm format:check
        run: pnpm format:check

      - name: pnpm test
        run: pnpm test

      - name: pnpm build
        run: pnpm build

# NOTE (Unit 10): the eventual wheel-publish workflow (lands when the
# project moves to PyPI publish) MUST run, in order:
#   1. ``pnpm install --frozen-lockfile && pnpm build`` in ``web/`` to
#      populate ``web/dist/`` (hatch ``force-include`` requires it).
#   2. ``python -m build`` in ``server/`` to produce the wheel.
# Skipping step 1 makes ``python -m build`` fail loudly because hatch
# can't find ``../web/dist`` at packaging time. That's the intended
# behavior so we never ship a wheel without the SPA bundle.
