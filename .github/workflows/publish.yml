# Publish the ``tensa`` distribution to PyPI via Trusted Publishing (OIDC).
#
# No API token is stored anywhere: PyPI's pending-publisher registration for
# this repository (owner Roger-GO, repo TENSA, workflow publish.yml) accepts
# GitHub's identity claim directly. Runs on every published release, plus a
# manual trigger for one-off publishes.
#
# The web SPA is built FIRST so hatch's force-include bundles ``web/dist``
# into the wheel as ``tensa/static`` (the wheel serves the UI standalone).
# Note: the sdist cannot carry ``../web/dist`` (outside the package root),
# so source installs still build the UI per the README quick start.
name: publish

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # Required for PyPI Trusted Publishing (OIDC token exchange).
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build the web UI (bundled into the wheel)
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        working-directory: server
        run: |
          python -m pip install --upgrade build
          python -m build --sdist --wheel -o dist .

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: server/dist
