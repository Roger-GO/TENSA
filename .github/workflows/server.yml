name: server

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "web/**"
      - ".github/workflows/server.yml"
      - "scripts/ci-matrix.sh"
  pull_request:
    paths:
      - "server/**"
      - "web/**"
      - ".github/workflows/server.yml"
      - "scripts/ci-matrix.sh"

jobs:
  lint-and-test:
    name: lint + types + tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # The server's pyproject.toml force-includes ../web/dist into the wheel,
      # so the SPA bundle must exist before `pip install -e ./server[dev]` runs.
      # Without this step hatchling fails with "Forced include not found".
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: web/package.json

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build web/dist (required by server force-include)
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install tensa with dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./server[dev]"

      - name: ci-matrix.sh
        run: bash ./scripts/ci-matrix.sh

      # GUI-parity ledger (v3.1 Unit 16, KTD-12). Fails when a new route lands
      # without an x-tensa-gui-location tag, when a 'none'-tagged route has
      # no deferral reason, or when a WS route / static mount lacks a
      # '# parity-reviewed: <date>' marker. Runs after the install step so the
      # app (and its OpenAPI schema) imports cleanly.
      - name: GUI-parity ledger check
        working-directory: server
        run: PYTHONPATH=src python ../scripts/check_gui_parity.py

  acceptance:
    name: curl walkthrough (Phase A R3)
    runs-on: ubuntu-latest
    # Acceptance tests are mandatory but separate from the lint/type/unit job.
    # They land as Unit 8; until then this job is a no-op placeholder so the
    # workflow file can be reviewed and merged ahead of the test infrastructure.
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder
        run: echo "Acceptance suite lands in Unit 8."
