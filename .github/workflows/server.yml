name: server

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/server.yml"
      - "scripts/ci-matrix.sh"
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/server.yml"
      - "scripts/ci-matrix.sh"

jobs:
  lint-and-test:
    name: lint + types + tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install andes-app with dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./server[dev]"

      - name: ci-matrix.sh
        run: bash ./scripts/ci-matrix.sh

  acceptance:
    name: curl walkthrough (Phase A R3)
    runs-on: ubuntu-latest
    # Acceptance tests are mandatory but separate from the lint/type/unit job.
    # They land as Unit 8; until then this job is a no-op placeholder so the
    # workflow file can be reviewed and merged ahead of the test infrastructure.
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder
        run: echo "Acceptance suite lands in Unit 8."
